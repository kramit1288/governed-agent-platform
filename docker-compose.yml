services:
  postgres:
    image: ankane/pgvector:pg17
    container_name: governed-agent-postgres
    environment:
      POSTGRES_DB: governed_agent
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d governed_agent"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
